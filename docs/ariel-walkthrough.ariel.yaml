title: "How ariel works"

sections:
  - title: "The four commands"
    mermaid_diagram: |
      graph LR
        User([User / LLM]) --> G[guide]
        User --> V[verify]
        User --> Ge[generate]
        User --> W[watch]
    steps:
      - narration: "ariel has four commands. This walkthrough covers how they fit together and what happens under the hood when you run them."

      - label: "guide"
        narration: "The guide command prints the full DSL reference to stdout. It exists specifically so an LLM can load the schema into context before authoring a walkthrough file."
        active_nodes: [G]
        animate_edges: [User-G]

      - label: "verify"
        narration: "verify lints a walkthrough file. It runs three checks in sequence: YAML syntax, semantic node/edge validation, and Mermaid syntax via an embedded JS runtime. Fast feedback is the goal — under one second."
        active_nodes: [V]
        animate_edges: [User-V]

      - label: "generate"
        narration: "generate produces a self-contained HTML file — all CSS and JS inlined, Mermaid loaded from a pinned CDN. The output opens by double-clicking. No server, no dependencies."
        active_nodes: [Ge]
        animate_edges: [User-Ge]

      - label: "watch"
        narration: "watch starts a local HTTP server with live reload. It opens a browser, watches the file for changes, and pushes a freshly-rendered page over a WebSocket on every save."
        active_nodes: [W]
        animate_edges: [User-W]

  - title: "The pipeline"
    mermaid_diagram: |
      graph TD
        User([User / LLM]) -->|ariel verify FILE| Parse[Parse YAML]
        User -->|ariel generate FILE| Parse
        User -->|ariel watch FILE| Parse
        Parse -->|error| ParseErr[Print errors · exit 1]
        Parse -->|valid| Verify[Semantic Verify]
        Verify -->|error| SemErr[Print errors · exit 1]
        Verify -->|ok| MermJS[Mermaid JS Validator]
        MermJS -->|error| MermErr[Print errors · exit 1]
        MermJS -->|ok| Router{Command?}
        Router -->|verify| Done[✓ valid — exit 0]
        Router -->|generate| Render[Render HTML Template]
        Router -->|watch| Server[HTTP + WebSocket Server]
        Render --> HTMLFile[.html file]
        Server --> Browser[Browser]
        FSWatch[fsnotify watcher] -->|file change| Parse
        Server -.->|ws update| Browser
    steps:
      - narration: "All three non-guide commands share the same parse pipeline before branching. Here is how the full pipeline looks."

      - label: "Parsing"
        narration: "The first gate is YAML parsing. The decoder runs in strict mode — unknown fields are errors, not warnings. If parsing fails, we stop immediately and print the YAML line number."
        highlight_nodes: [Parse, ParseErr]
        active_nodes: [Parse]
        animate_edges: [User-Parse]

      - label: "Semantic verification"
        narration: "If the YAML is structurally valid, semantic verification runs next. It checks that every node ID referenced in steps actually exists in the mermaid_diagram block, and that every animate_edges pair has a real edge."
        highlight_nodes: [Verify, SemErr]
        active_nodes: [Verify]
        animate_edges: [Parse-Verify]

      - label: "Mermaid validation"
        narration: "The third gate validates Mermaid syntax. Mermaid is a JavaScript library, so ariel embeds the full Mermaid JS bundle and runs it via goja — a pure-Go JS runtime. No Node required, but it adds ~2MB to the binary."
        highlight_nodes: [MermJS, MermErr]
        active_nodes: [MermJS]
        animate_edges: [Verify-MermJS]

      - label: "The router"
        narration: "After all three checks pass, the command branches. verify exits here with a success message. generate and watch continue to their respective output paths."
        highlight_nodes: [Router, Done]
        active_nodes: [Router]
        animate_edges: [MermJS-Router, Router-Done]

      - label: "generate"
        narration: "generate renders a self-contained HTML file — all CSS and JS inlined, the step script baked in as a JS object, Mermaid loaded from a pinned CDN. Double-click to open. No server needed."
        highlight_nodes: [Render, HTMLFile]
        active_nodes: [Render]
        animate_edges: [Router-Render, Render-HTMLFile]

      - label: "watch"
        narration: "watch starts an HTTP server that serves the same rendered HTML but with a WebSocket client snippet injected. It opens a browser automatically and watches the file with fsnotify."
        highlight_nodes: [Server, Browser]
        active_nodes: [Server]
        animate_edges: [Router-Server, Server-Browser]

      - label: "Live reload loop"
        narration: "When the file changes, fsnotify fires. The server re-runs the parse pipeline and broadcasts the new rendered HTML over the WebSocket. The browser replaces the entire page — back to step 1, no manual refresh."
        highlight_nodes: [FSWatch, Parse, Server, Browser]
        active_nodes: [FSWatch]
        animate_edges: [FSWatch-Parse, Server-Browser]

