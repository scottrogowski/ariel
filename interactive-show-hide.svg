<svg xmlns="http://www.w3.org/2000/svg" width="520" height="150">
  <!--
    Technique: HTML <input type="checkbox"> + <label> inside <foreignObject>.
    CSS :checked sibling combinator (~) drives show/hide without any JavaScript.
    All elements are siblings in DOM order: input → label(button) → panel.
  -->
  <foreignObject x="0" y="0" width="520" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="position:relative;width:520px;height:150px;font-family:monospace;box-sizing:border-box;">
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        #t { display: none; }

        h4 {
          text-align: center;
          font-size: 13px;
          color: #555;
          padding: 8px 0 0;
          font-weight: normal;
        }

        .btn {
          position: absolute;
          top: 44px; left: 20px;
          width: 130px; height: 64px;
          background: #2980b9;
          border-radius: 6px;
          color: white;
          font-size: 13px;
          font-family: monospace;
          text-align: center;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          user-select: none;
        }

        .btn .show-label { display: block; }
        .btn .hide-label { display: none; }

        .panel {
          display: none;
          position: absolute;
          top: 36px; left: 178px;
          width: 322px; height: 80px;
          background: #eaf4fb;
          border-left: 4px solid #2980b9;
          border-radius: 0 4px 4px 0;
          padding: 10px 14px;
          font-size: 12px;
          color: #333;
        }

        .panel-title {
          font-size: 13px;
          color: #2980b9;
          font-weight: bold;
          margin-bottom: 5px;
        }

        /* :checked drives both the panel visibility and button label swap */
        #t:checked ~ .btn .show-label { display: none; }
        #t:checked ~ .btn .hide-label { display: block; }
        #t:checked ~ .panel           { display: block; }
      </style>

      <h4>CSS :checked show/hide — click the button</h4>

      <input type="checkbox" id="t"/>
      <label class="btn" for="t">
        <span class="show-label">▶ Show note</span>
        <span class="hide-label">▼ Hide note</span>
      </label>

      <div class="panel">
        <div class="panel-title">Step 1: Initialization</div>
        Loads config from environment variables and validates
        all required keys before starting the service.
      </div>

    </div>
  </foreignObject>
</svg>
