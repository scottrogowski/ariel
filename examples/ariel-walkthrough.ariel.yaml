title: "How ariel works"

sections:
  - title: "The comprehension gap"
    mermaid_diagram: |
      flowchart TD
        LLM[LLM] --> Code[Code Volume]
        Code --> Review[Code Review]
        Review --> WM[Working Memory]
        WM -->|overloaded| Stamp[Rubber Stamp]
        WM -->|within limits| Model[Mental Model]
        Model --> Decision[Good Decision]
        Ariel[ariel] --> WM
    steps:
      - label: "What is Ariel?"
        narration: "LLMs generate code very quickly. While that code is usually semantically/syntactically correct, it is still useful for human engineers to comprehend and evaluate the architectural choices."

      - label: "The problem"
        highlight_nodes: [LLM, Code]
        narration: "LLMs generate code very quickly. While that code is usually semantically/syntactically correct, it is still useful for human engineers to comprehend and evaluate the architectural choices."

      - label: "LLM velocity"
        highlight_nodes: [LLM, Code]
        narration: "A human doing a code review faces the same cognitive load as if they had written it themselves. Every line must still be read and understood."

      - label: "Architectural diagrams"
        highlight_nodes: [Code, Review]
        narration: "Architecture diagrams, like what Mermaid generates, are a step forward and help to build context quicker. Instead of building up a mental model from scratch, the reviewer can cross-reference their understanding against a map."

      - label: "The review bottleneck"
        focus_nodes: [WM]
        highlight_nodes: [Code, Review]
        narration: "However, architecture diagrams are not a complete solution. Without a narrative structure, reviewers are forced to switch back and forth between diagram and code. Reviewers rarely know the optimal order for building their mental model."

      - label: "Two outcomes"
        highlight_nodes: [WM, Stamp, Model, Decision]
        narration: "Overloaded reviewers rubber-stamp. Comprehending reviewers keep up with the changes and make better decisions. [Endsley's situational awareness research (1988)](https://doi.org/10.1177/154193128803200221) identifies this projection of future state as the critical level humans lose first under load."

      - label: "ariel's role"
        focus_nodes: [Ariel]
        highlight_nodes: [WM, Model]
        narration: "Sequential narration maps to serial human cognition. One idea per step, paired with a matching visual — [Paivio's Dual Coding Theory](https://archive.org/details/mentalrepresenta0000paiv) — keeps working memory within its limits and builds understanding incrementally."


  - title: "The four commands"
    mermaid_diagram: |
      graph LR
        User[User/LLM] --> G[guide]
        User --> V[verify]
        User --> Ge[generate]
        User --> W[watch]
    steps:
      - narration: "ariel has four primary commands. This walkthrough covers how they fit together and what happens under the hood when you run them."

      - label: "guide"
        narration: "The guide command prints the full DSL reference to stdout. It exists specifically so an LLM can load the schema into context before authoring a walkthrough file."
        focus_nodes: [G]
        highlight_nodes: [User]

      - label: "verify"
        narration: "verify lints a walkthrough file. It runs three checks in sequence: YAML syntax, semantic node/edge validation, and Mermaid syntax via an embedded JS runtime. Fast feedback is the goal — under one second."
        focus_nodes: [V]
        highlight_nodes: [User]

      - label: "generate"
        narration: "generate produces a self-contained HTML file — all CSS and JS inlined, Mermaid loaded from a pinned CDN. The output opens by double-clicking. No server, no dependencies."
        focus_nodes: [Ge]
        highlight_nodes: [User]

      - label: "watch"
        narration: "watch starts a local HTTP server with live reload. It opens a browser, watches the file for changes, and pushes a freshly-rendered page over a WebSocket on every save."
        focus_nodes: [W]
        highlight_nodes: [User]

  - title: "The pipeline"
    mermaid_diagram: |
      graph TD
        User([User / LLM]) -->|ariel verify FILE| Parse[Parse YAML]
        User -->|ariel generate FILE| Parse
        User -->|ariel watch FILE| Parse
        Parse -->|error| ParseErr[Print errors · exit 1]
        Parse -->|valid| Verify[Semantic Verify]
        Verify -->|error| SemErr[Print errors · exit 1]
        Verify -->|ok| MermJS[Mermaid JS Validator]
        MermJS -->|error| MermErr[Print errors · exit 1]
        MermJS -->|ok| Router{Command?}
        Router -->|verify| Done[✓ valid — exit 0]
        Router -->|generate| Render[Render HTML Template]
        Router -->|watch| Server[HTTP + WebSocket Server]
        Render --> HTMLFile[.html file]
        Server --> Browser[Browser]
        FSWatch[fsnotify watcher] -->|file change| Parse
        Server -.->|ws update| Browser
    steps:
      - narration: "All three non-guide commands share the same parse pipeline before branching. Here is how the full pipeline looks."

      - label: "Parsing"
        narration: "The first gate is YAML parsing. The decoder runs in strict mode — unknown fields are errors, not warnings. If parsing fails, we stop immediately and print the YAML line number."
        highlight_nodes: [Parse, ParseErr]
        focus_nodes: [Parse]

      - label: "Semantic verification"
        narration: "If the YAML is structurally valid, semantic verification runs next. It checks that every node ID referenced in steps actually exists in the mermaid_diagram block."
        highlight_nodes: [Verify, SemErr]
        focus_nodes: [Verify]

      - label: "Mermaid validation"
        narration: "The third gate validates Mermaid syntax. Mermaid is a JavaScript library, so ariel embeds the full Mermaid JS bundle and runs it via goja — a pure-Go JS runtime. No Node required, but it adds ~2MB to the binary."
        highlight_nodes: [MermJS, MermErr]
        focus_nodes: [MermJS]

      - label: "The router"
        narration: "After all three checks pass, the command branches. verify exits here with a success message. generate and watch continue to their respective output paths."
        highlight_nodes: [Router, Done]
        focus_nodes: [Router]

      - label: "generate"
        narration: "generate renders a self-contained HTML file — all CSS and JS inlined, the step script baked in as a JS object, Mermaid loaded from a pinned CDN. Double-click to open. No server needed."
        highlight_nodes: [Render, HTMLFile]
        focus_nodes: [Render]

      - label: "watch"
        narration: "watch starts an HTTP server that serves the same rendered HTML but with a WebSocket client snippet injected. It opens a browser automatically and watches the file with fsnotify."
        highlight_nodes: [Server, Browser]
        focus_nodes: [Server]

      - label: "Live reload loop"
        narration: "When the file changes, fsnotify fires and re-runs the parse pipeline. The server broadcasts the new rendered HTML over the WebSocket and the browser replaces the page — back to step 1, no manual refresh."
        highlight_nodes: [FSWatch, Parse]
        focus_nodes: [FSWatch]
