<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How ariel works | Ariel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #5b8dee;
    --accent-glow: rgba(91, 141, 238, 0.3);
    --success: #4ecdc4;
    --text: #e8eaf0;
    --muted: #6b7280;
    --narration-bg: #141720;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .ariel-link {
    position: absolute;
    right: 32px;
    display: flex;
    align-items: center;
    opacity: 0.8;
    transition: opacity 0.15s ease;
    text-decoration: none;
  }

  .ariel-link:hover { opacity: 1; }

  .ariel-link img {
    height: 40px;
    width: 40px;
    border-radius: 50%;
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
  }

  .diagram-pane {
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
  }

  #mermaid-container {
    width: 100%;
    max-width: 600px;
    transition: opacity 0.2s ease;
  }

  #mermaid-container svg {
    width: 100% !important;
    height: auto !important;
  }

  .side-pane {
    display: flex;
    flex-direction: column;
    background: var(--narration-bg);
  }

  .narration-area {
    flex: 1;
    padding: 40px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .narration-text {
    font-size: 17px;
    line-height: 1.65;
    color: var(--text);
    min-height: 120px;
    transition: opacity 0.25s ease;
  }

  .narration-text.fade { opacity: 0; }

  .progress-track {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .progress-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    width: 20px;
    border-radius: 3px;
  }

  .progress-dot.visited { background: var(--muted); }

  /* Intro dot (first step of each section) stays circular, uses accent color */
  .progress-dot.intro-dot {
    background: var(--accent);
    opacity: 0.3;
  }

  .progress-dot.intro-dot.active {
    opacity: 1;
    width: 6px;
    border-radius: 50%;
  }

  .progress-dot.intro-dot.visited {
    background: var(--muted);
    opacity: 1;
  }

  .section-track {
    display: flex;
    gap: 8px;
    align-items: center;
    padding-bottom: 8px;
  }

  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .section-dot.active {
    background: var(--success);
    box-shadow: 0 0 8px rgba(78, 205, 196, 0.3);
    width: 24px;
    border-radius: 3px;
  }

  .section-dot.visited { background: var(--muted); }

  .controls {
    padding: 24px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  button {
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }

  .btn-prev {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-prev:hover:not(:disabled) {
    color: var(--text);
    border-color: var(--muted);
  }

  .btn-next {
    background: var(--accent);
    color: white;
    flex: 1;
  }

  .btn-next:hover:not(:disabled) {
    background: #4a7de0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  #mermaid-container .node rect,
  #mermaid-container .node circle,
  #mermaid-container .node polygon,
  #mermaid-container .node ellipse,
  #mermaid-container .node path {
    transition: fill 0.35s ease, stroke 0.35s ease, filter 0.35s ease, opacity 0.35s ease;
  }

  #mermaid-container .node.navigable { cursor: pointer; }

  #mermaid-container .node.navigable:hover rect,
  #mermaid-container .node.navigable:hover circle,
  #mermaid-container .node.navigable:hover polygon,
  #mermaid-container .node.navigable:hover ellipse,
  #mermaid-container .node.navigable:hover path {
    opacity: 0.75;
  }

  /* Dimming: applied when any highlight or active nodes exist on the current step */
  #mermaid-container.has-highlights .node {
    opacity: 0.25;
    transition: opacity 0.35s ease;
  }

  #mermaid-container.has-highlights .node.highlighted,
  #mermaid-container.has-highlights .node.active {
    opacity: 1;
  }

  #mermaid-container .node.highlighted rect,
  #mermaid-container .node.highlighted circle,
  #mermaid-container .node.highlighted polygon,
  #mermaid-container .node.highlighted ellipse,
  #mermaid-container .node.highlighted path {
    fill: #1e3a6e !important;
    stroke: var(--accent) !important;
    stroke-width: 2px !important;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }

  #mermaid-container .node.active rect,
  #mermaid-container .node.active circle,
  #mermaid-container .node.active polygon,
  #mermaid-container .node.active ellipse,
  #mermaid-container .node.active path {
    fill: #1a4a7a !important;
    stroke: var(--success) !important;
    stroke-width: 2.5px !important;
    filter: drop-shadow(0 0 12px rgba(78, 205, 196, 0.4));
  }

  #mermaid-container .flowchart-link.animated {
    stroke: var(--accent) !important;
    stroke-width: 2.5px !important;
    stroke-dasharray: 8 4;
    animation: flowEdge 0.8s linear infinite;
  }

  @keyframes flowEdge {
    from { stroke-dashoffset: 24; }
    to   { stroke-dashoffset: 0;  }
  }

  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .diagram-pane {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 24px;
    }
  }
</style>
</head>

<div class="main">
  <div class="diagram-pane">
    <div id="mermaid-container"></div>
  </div>

  <div class="side-pane">
    <div class="narration-area">
      <div class="step-label" id="step-label"></div>
      <div class="narration-text" id="narration"></div>
      <div class="section-track" id="section-track"></div>
      <div class="progress-track" id="progress-track"></div>
    </div>
    <div class="controls">
      <button class="btn-prev" id="btn-prev" onclick="prevStep()" disabled>← Back</button>
      <button class="btn-next" id="btn-next" onclick="nextStep()"></button>
    </div>
  </div>

<script>
const sections = [{"title":"The comprehension gap","mermaid_diagram":"flowchart TD\n  LLM[LLM] --\u003e Code[Code Volume]\n  Code --\u003e Review[Code Review]\n  Review --\u003e WM[Working Memory]\n  WM --\u003e|overloaded| Stamp[Rubber Stamp]\n  WM --\u003e|within limits| Model[Mental Model]\n  Model --\u003e Decision[Good Decision]\n  Ariel[ariel] --\u003e WM","steps":[{"label":"The problem","narration":"LLMs generate code faster than humans can understand it. The bottleneck has shifted from writing to comprehension — and the gap is widening.","highlight_nodes":[],"active_nodes":[],"animate_edges":[]},{"label":"LLM velocity","narration":"An LLM produces a complete implementation in seconds. A human reading it cold faces the same cognitive load as if they had written nothing — every line must still be read, understood, and held in mind.","highlight_nodes":["LLM","Code"],"active_nodes":[],"animate_edges":["LLM-Code"]},{"label":"The review bottleneck","narration":"Code review happens at the pace of generation, not comprehension. Working memory holds roughly four chunks (Cowan, 2001). A PR that took 30 seconds to generate may take 30 minutes to truly understand.","highlight_nodes":["Code","Review"],"active_nodes":["WM"],"animate_edges":["Code-Review","Review-WM"]},{"label":"Two outcomes","narration":"Overloaded reviewers rubber-stamp. Comprehending reviewers build mental models and catch what the LLM missed — security assumptions, edge cases, architectural drift. Endsley's situational awareness research (1988) identifies this projection of future state as the critical level humans lose first under load.","highlight_nodes":["WM","Stamp","Model","Decision"],"active_nodes":[],"animate_edges":["WM-Stamp","WM-Model","Model-Decision"]},{"label":"ariel's role","narration":"Sequential narration maps to serial human cognition. One idea per step, paired with a matching visual — Paivio's Dual Coding Theory — keeps working memory within its limits and builds understanding incrementally.","highlight_nodes":["WM","Model"],"active_nodes":["Ariel"],"animate_edges":["Ariel-WM"]}]},{"title":"The six commands","mermaid_diagram":"graph LR\n  User([User / LLM]) --\u003e V[verify]\n  User --\u003e Ge[generate]\n  User --\u003e W[watch]\n  User --\u003e G[guide]\n  User --\u003e SE[single-diagram-example]\n  User --\u003e ME[multiple-diagram-example]","steps":[{"label":"","narration":"ariel has four primary commands. This walkthrough covers how they fit together and what happens under the hood when you run them.","highlight_nodes":[],"active_nodes":[],"animate_edges":[]},{"label":"guide","narration":"The guide command prints the full DSL reference to stdout. It exists specifically so an LLM can load the schema into context before authoring a walkthrough file.","highlight_nodes":[],"active_nodes":["G"],"animate_edges":["User-G"]},{"label":"verify","narration":"verify lints a walkthrough file. It runs three checks in sequence: YAML syntax, semantic node/edge validation, and Mermaid syntax via an embedded JS runtime. Fast feedback is the goal — under one second.","highlight_nodes":[],"active_nodes":["V"],"animate_edges":["User-V"]},{"label":"generate","narration":"generate produces a self-contained HTML file — all CSS and JS inlined, Mermaid loaded from a pinned CDN. The output opens by double-clicking. No server, no dependencies.","highlight_nodes":[],"active_nodes":["Ge"],"animate_edges":["User-Ge"]},{"label":"watch","narration":"watch starts a local HTTP server with live reload. It opens a browser, watches the file for changes, and pushes a freshly-rendered page over a WebSocket on every save.","highlight_nodes":[],"active_nodes":["W"],"animate_edges":["User-W"]}]},{"title":"The pipeline","mermaid_diagram":"graph TD\n  User([User / LLM]) --\u003e|ariel verify FILE| Parse[Parse YAML]\n  User --\u003e|ariel generate FILE| Parse\n  User --\u003e|ariel watch FILE| Parse\n  Parse --\u003e|error| ParseErr[Print errors · exit 1]\n  Parse --\u003e|valid| Verify[Semantic Verify]\n  Verify --\u003e|error| SemErr[Print errors · exit 1]\n  Verify --\u003e|ok| MermJS[Mermaid JS Validator]\n  MermJS --\u003e|error| MermErr[Print errors · exit 1]\n  MermJS --\u003e|ok| Router{Command?}\n  Router --\u003e|verify| Done[✓ valid — exit 0]\n  Router --\u003e|generate| Render[Render HTML Template]\n  Router --\u003e|watch| Server[HTTP + WebSocket Server]\n  Render --\u003e HTMLFile[.html file]\n  Server --\u003e Browser[Browser]\n  FSWatch[fsnotify watcher] --\u003e|file change| Parse\n  Server -.-\u003e|ws update| Browser","steps":[{"label":"","narration":"All three non-guide commands share the same parse pipeline before branching. Here is how the full pipeline looks.","highlight_nodes":[],"active_nodes":[],"animate_edges":[]},{"label":"Parsing","narration":"The first gate is YAML parsing. The decoder runs in strict mode — unknown fields are errors, not warnings. If parsing fails, we stop immediately and print the YAML line number.","highlight_nodes":["Parse","ParseErr"],"active_nodes":["Parse"],"animate_edges":["User-Parse"]},{"label":"Semantic verification","narration":"If the YAML is structurally valid, semantic verification runs next. It checks that every node ID referenced in steps actually exists in the mermaid_diagram block, and that every animate_edges pair has a real edge.","highlight_nodes":["Verify","SemErr"],"active_nodes":["Verify"],"animate_edges":["Parse-Verify"]},{"label":"Mermaid validation","narration":"The third gate validates Mermaid syntax. Mermaid is a JavaScript library, so ariel embeds the full Mermaid JS bundle and runs it via goja — a pure-Go JS runtime. No Node required, but it adds ~2MB to the binary.","highlight_nodes":["MermJS","MermErr"],"active_nodes":["MermJS"],"animate_edges":["Verify-MermJS"]},{"label":"The router","narration":"After all three checks pass, the command branches. verify exits here with a success message. generate and watch continue to their respective output paths.","highlight_nodes":["Router","Done"],"active_nodes":["Router"],"animate_edges":["MermJS-Router","Router-Done"]},{"label":"generate","narration":"generate renders a self-contained HTML file — all CSS and JS inlined, the step script baked in as a JS object, Mermaid loaded from a pinned CDN. Double-click to open. No server needed.","highlight_nodes":["Render","HTMLFile"],"active_nodes":["Render"],"animate_edges":["Router-Render","Render-HTMLFile"]},{"label":"watch","narration":"watch starts an HTTP server that serves the same rendered HTML but with a WebSocket client snippet injected. It opens a browser automatically and watches the file with fsnotify.","highlight_nodes":["Server","Browser"],"active_nodes":["Server"],"animate_edges":["Router-Server","Server-Browser"]},{"label":"Live reload loop","narration":"When the file changes, fsnotify fires. The server re-runs the parse pipeline and broadcasts the new rendered HTML over the WebSocket. The browser replaces the entire page — back to step 1, no manual refresh.","highlight_nodes":["FSWatch","Parse","Server","Browser"],"active_nodes":["FSWatch"],"animate_edges":["FSWatch-Parse","Server-Browser"]}]}];

let nodeMap = {};
let edgeMap = {};
let nodeSteps = {}; // node ID → sorted list of step indices that reference it
let currentSection = 0;
let currentStep = 0;
let initialized = false;

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#1a2744',
    primaryTextColor: '#e8eaf0',
    primaryBorderColor: '#2a3a5a',
    lineColor: '#4a5568',
    secondaryColor: '#1a1d27',
    tertiaryColor: '#1a1d27',
    background: '#0f1117',
    mainBkg: '#1a2744',
    nodeBorder: '#2a3a5a',
    clusterBkg: '#1a1d27',
    titleColor: '#e8eaf0',
    edgeLabelBackground: '#1a1d27',
    fontFamily: 'Inter, system-ui, sans-serif'
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function initSection(idx) {
  const sec = sections[idx];
  const container = document.getElementById('mermaid-container');
  container.innerHTML = '<div class="mermaid">' + sec.mermaid_diagram + '</div>';
  await mermaid.run({ nodes: [container.querySelector('.mermaid')] });
  nodeMap = {};
  edgeMap = {};
  nodeSteps = {};
  buildNodeMap();
  buildNodeSteps();
}

initSection(0).then(() => {
  buildSectionDots();
  buildProgressDots();
  renderStep();
  initialized = true;
});

function buildNodeMap() {
  const svg = document.querySelector('#mermaid-container svg');
  if (!svg) return;

  // Mermaid 10.6.1 gives every node group an id of "flowchart-{nodeId}-{n}".
  // Using the element ID avoids label-text collisions when two nodes share the same display label.
  svg.querySelectorAll('.node').forEach(group => {
    const m = group.id.match(/^flowchart-(\w+)-\d+$/);
    if (m) nodeMap[m[1]] = group;
  });

  svg.querySelectorAll('.flowchart-link').forEach(el => {
    const cls = Array.from(el.classList);
    const srcCls = cls.find(c => c.startsWith('LS-'));
    const dstCls = cls.find(c => c.startsWith('LE-'));
    if (!srcCls || !dstCls) return;
    const key = srcCls.slice(3) + '-' + dstCls.slice(3);
    if (!edgeMap[key]) edgeMap[key] = [];
    edgeMap[key].push(el);
  });
}

function buildNodeSteps() {
  const steps = sections[currentSection].steps;
  steps.forEach((step, i) => {
    [...step.highlight_nodes, ...step.active_nodes].forEach(id => {
      if (!nodeSteps[id]) nodeSteps[id] = [];
      if (!nodeSteps[id].includes(i)) nodeSteps[id].push(i);
    });
  });
  Object.keys(nodeMap).forEach(id => {
    const el = nodeMap[id];
    if (nodeSteps[id]) {
      el.classList.add('navigable');
      el.onclick = () => handleNodeClick(id);
    }
  });
}

function handleNodeClick(id) {
  const stepList = nodeSteps[id];
  if (!stepList) return;
  const next = stepList.find(i => i > currentStep);
  goToStep(next !== undefined ? next : stepList[0]);
}

function clearAllHighlights() {
  const svg = document.querySelector('#mermaid-container svg');
  if (!svg) return;
  svg.querySelectorAll('.node').forEach(n => n.classList.remove('highlighted', 'active'));
  svg.querySelectorAll('.flowchart-link').forEach(e => e.classList.remove('animated'));
}

function applyStep(step) {
  clearAllHighlights();
  const hasHighlights = step.highlight_nodes.length > 0 || step.active_nodes.length > 0;
  document.getElementById('mermaid-container').classList.toggle('has-highlights', hasHighlights);
  step.highlight_nodes.forEach(id => { if (nodeMap[id]) nodeMap[id].classList.add('highlighted'); });
  step.active_nodes.forEach(id => { if (nodeMap[id]) nodeMap[id].classList.add('active'); });
  step.animate_edges.forEach(ref => {
    (edgeMap[ref] || []).forEach(el => el.classList.add('animated'));
  });
}

function buildProgressDots() {
  const track = document.getElementById('progress-track');
  track.innerHTML = '';
  sections[currentSection].steps.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = i === 0 ? 'progress-dot intro-dot' : 'progress-dot';
    dot.onclick = () => goToStep(i);
    track.appendChild(dot);
  });
}

function updateProgressDots() {
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.className = i === 0 ? 'progress-dot intro-dot' : 'progress-dot';
    if (i < currentStep) dot.classList.add('visited');
    if (i === currentStep) dot.classList.add('active');
  });
}

function buildSectionDots() {
  const track = document.getElementById('section-track');
  if (!track) return;
  track.innerHTML = '';
  if (sections.length <= 1) { track.style.display = 'none'; return; }
  track.style.display = 'flex';
  sections.forEach((sec, i) => {
    const dot = document.createElement('div');
    dot.className = 'section-dot';
    dot.title = sec.title || ('Section ' + (i + 1));
    dot.onclick = () => goToSection(i);
    track.appendChild(dot);
  });
}

function updateSectionDots() {
  document.querySelectorAll('.section-dot').forEach((dot, i) => {
    dot.className = 'section-dot';
    if (i < currentSection) dot.classList.add('visited');
    if (i === currentSection) dot.classList.add('active');
  });
}

function goToStep(index) {
  currentStep = index;
  renderStep();
}

async function goToSection(idx, stepIdx) {
  const container = document.getElementById('mermaid-container');
  container.style.opacity = '0';
  document.getElementById('narration').classList.add('fade');
  await sleep(200);
  currentSection = idx;
  currentStep = stepIdx !== undefined ? stepIdx : 0;
  await initSection(idx);
  buildProgressDots();
  updateSectionDots();
  renderStep();
  container.style.opacity = '1';
}

function renderStep() {
  const sec = sections[currentSection];
  const step = sec.steps[currentStep];
  const narrationEl = document.getElementById('narration');
  const labelEl = document.getElementById('step-label');

  narrationEl.classList.add('fade');
  setTimeout(() => {
    narrationEl.textContent = step.narration || '';
    let label;
    if (currentStep === 0) {
      label = (sections.length > 1 && sec.title) ? sec.title : (step.label || '');
    } else {
      label = currentStep + ' of ' + (sec.steps.length - 1);
      if (step.label) label += ' — ' + step.label;
      if (sections.length > 1 && sec.title) label = sec.title + ' · ' + label;
    }
    labelEl.textContent = label;
    narrationEl.classList.remove('fade');
  }, 200);

  if (initialized) applyStep(step);

  const isFirst = currentSection === 0 && currentStep === 0;
  const isLastStep = currentStep === sec.steps.length - 1;
  const isLastSection = currentSection === sections.length - 1;

  document.getElementById('btn-prev').disabled = isFirst;

  const nextBtn = document.getElementById('btn-next');
  if (isLastStep && isLastSection) {
    nextBtn.textContent = 'Done';
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = isFirst ? 'Begin walkthrough →' : 'Next →';
    nextBtn.disabled = false;
  }

  updateProgressDots();
  updateSectionDots();
}

function nextStep() {
  const sec = sections[currentSection];
  if (currentStep < sec.steps.length - 1) {
    currentStep++;
    renderStep();
  } else if (currentSection < sections.length - 1) {
    goToSection(currentSection + 1);
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  } else if (currentSection > 0) {
    const prevIdx = currentSection - 1;
    goToSection(prevIdx, sections[prevIdx].steps.length - 1);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
});
</script>
