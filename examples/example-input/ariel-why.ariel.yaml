title: "The problem ariel solves"

mermaid_diagram: |
  flowchart TD
    LLM[LLM] --> Code[Lots of code]
    Code --> Review[Code Review]
    Review --> WM{Comprehend?}
    WM -->|no| Stamp["Rubber Stamp (most likely)"]
    WM -->|yes| Model[Mental Model]
    Model --> Decision[Good Decision]
steps:
  - label: "The problem ariel solves"
    narration: "Ariel generates step-by-step diagram walkthroughs to help humans understand complex systems."

  - label: "The problem"
    highlight_nodes: [LLM, Code]
    narration: "LLMs generate code much faster than engineers. Once upon a time, our bottleneck was how fast we could write code. Now, the bottleneck is reviewing AI-generated code"

  - label: "LLM velocity"
    highlight_nodes: [LLM, Code]
    narration: "While the code AIs generate is usually valid on a low-level, is still useful (perhaps critical) for human engineers to comprehend and evaluate the architecture."

  - label: "Architectural diagrams"
    highlight_nodes: [Code, Review]
    narration: "Automatically generating diagrams helps. With a diagram handy, instead of building a mental model from scratch, the reviewer can now cross-reference against the code."

  - label: "The review bottleneck"
    focus_nodes: [WM]
    highlight_nodes: [Code, Review]
    narration: "However, diagrams without narrative still leave reviewers overloaded without guidance or even a prescribed reading order."

  - label: "Two outcomes"
    highlight_nodes: [WM, Stamp, Model, Decision]
    narration: "Overloaded reviewers rubber-stamp. Comprehending reviewers make better decisions."

  - label: "ariel's role"
    highlight_nodes: [WM, Model, Decision]
    narration: "ariel sequences the narrative — one idea per step, one visual change per idea. Working memory stays within its limits. Understanding builds incrementally."
